<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us Voice Chat - iOS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button.host {
            background-color: #34c759;
        }
        button:hover {
            opacity: 0.9;
        }
        .hidden {
            display: none;
        }
        .error {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Setup Screen for iOS Host -->
    <div class="card" id="setup-screen">
        <h2>AUVc iOS Host</h2>
        <p>Status: <span id="status" style="color: #ff3b30;">Disconnected</span></p>
        
        <input type="text" id="roomCode" placeholder="Enter Room Code (e.g. ABCDE)" required>
        <button class="host" id="hostBtn">Start iOS Hosting</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <!-- Active Game Screen -->
    <div class="card hidden" id="game-screen">
        <h3>Hosting Room: <span id="activeRoom"></span></h3>
        <p>Proximity Voice Chat Active</p>
        <p>Connected Players: <span id="playerCount">0</span></p>
    </div>

    <!-- Include Socket.io client library via CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Replace with your cloud signaling server URL (e.g., Render or Glitch)
        const SERVER_URL = 'https://your-backend-server-url.onrender.com';
        let socket;
        let localAudioStream = null;

        document.getElementById('hostBtn').addEventListener('click', async () => {
            const roomCode = document.getElementById('roomCode').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = '';

            if (!roomCode) {
                errorMsg.innerText = 'Please enter a valid room code.';
                return;
            }

            try {
                // This explicitly prompts the user for microphone permissions on iOS
                localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                console.log("Microphone access granted by iOS user.");
                
                // Initialize Socket.io connection after permission is given
                connectToSignalingServer(roomCode);

            } catch (err) {
                console.error("Microphone permission error:", err);
                errorMsg.innerText = 'Microphone permission is required to host voice chat.';
            }
        });

        function connectToSignalingServer(roomCode) {
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                // Register this device as the host of the room
                socket.emit('join-room', { 
                    role: 'host', 
                    room: roomCode 
                });
            });

            socket.on('room-joined', () => {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('activeRoom').innerText = roomCode;
                document.getElementById('status').innerText = 'Connected';
                document.getElementById('status').style.color = '#34c759';
            });

            socket.on('room-error', (msg) => {
                document.getElementById('errorMsg').innerText = msg;
                socket.disconnect();
            });

            socket.on('disconnect', () => {
                document.getElementById('status').innerText = 'Disconnected';
                document.getElementById('status').style.color = '#ff3b30';
            });
        }
    </script>
</body>
</html>

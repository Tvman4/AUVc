name: Build AUVc iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Capacitor and iOS Platform Safely
        run: |
          cd AUVc-files
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init AUVc com.austuff.auvc --web-dir public
          npx cap add ios || true

      - name: Update Xcode Project & Podfile Deployment Target to 15.0
        run: |
          cd AUVc-files/ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' App.xcodeproj/project.pbxproj

          rm -rf Podfile.lock Pods/
          
          cat << 'EOF' > Podfile
          platform :ios, '15.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          pod cache clean --all || true
          pod install --repo-update

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build and Archive iOS App
        run: |
          cd AUVc-files/ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath build/App.xcarchive \
                     IPHONEOS_DEPLOYMENT_TARGET=15.0 \
                     archive \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Generate Unsigned IPA Manually
        run: |
          cd AUVc-files/ios/App
          mkdir -p build/ipa/Payload
          # Move the built app binary into the Payload directory to package it as an IPA
          mv build/App.xcarchive/Products/Applications/App.app build/ipa/Payload/
          cd build/ipa
          zip -r AUVc.zip Payload
          mv AUVc.zip AUVc.ipa
          rm -rf Payload

      - name: Upload Artifact IPA
        uses: actions/upload-artifact@v4
        with:
          name: AUVc-iOS-Build
          path: AUVc-files/ios/App/build/ipa/AUVc.ipa

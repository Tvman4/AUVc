name: Build AUVc iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Capacitor and iOS Platform Safely
        run: |
          cd AUVc-files
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init AUVc com.austuff.auvc --web-dir public
          npx cap add ios || true

      - name: Fix Podfile Target and Run Pod Install Properly
        run: |
          cd AUVc-files/ios/App
          # Clear existing pod lock files and cache fragments that cause version sticking
          rm -rf Podfile.lock Pods/
          
          cat << 'EOF' > Podfile
          # Require iOS 15.0 to fully satisfy modern Capacitor packages
          platform :ios, '15.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          pod cache clean --all || true
          pod install --repo-update

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build and Archive iOS App
        run: |
          cd AUVc-files/ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath build/App.xcarchive \
                     archive \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Export Unsigned IPA Package
        run: |
          cd AUVc-files/ios/App
          xcodebuild -exportArchive \
                     -archivePath build/App.xcarchive \
                     -exportPath build/ipa \
                     -exportOptionsPlist ExportOptions.plist \
                     -allowProvisioningUpdates || true

      - name: Upload Artifact IPA
        uses: actions/upload-artifact@v4
        with:
          name: AUVc-iOS-Build
          path: AUVc-files/ios/App/build/ipa/*.ipa
